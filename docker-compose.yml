version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: poster
      POSTGRES_PASSWORD: password
      POSTGRES_DB: youtube_downloader
    ports:
      - "5433:5432" # Changed mapping due to local postgres instance
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:5.0.1
    ports:
      - "6379:6379"

volumes:
  postgres_data:
